<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アイコンの変遷 | Nami Kimura</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="page">
  <a class="back-link" href="index.html">← トップに戻る</a>
  <h1>アイコンの変遷</h1>

  <ol class="timeline timeline--tight">
    <li class="timeline-item">
      <div class="timeline-body">
        <p>もともとは社内でドラクエのスライムの画像をアイコンとして使っていた。</p>
      </div>
    </li>

    <li class="timeline-item">
      <div class="timeline-body">
        <p>著作権を考慮し、自作のアイコンに変更。スライムの面影を残しつつパワポで作成。</p>
        <img class="timeline-image" src="images/icon-origin.png" alt="パワポで描いたスライム風アイコン">
      </div>
    </li>

    <li class="timeline-item">
      <div class="timeline-body">
        <p>季節ごとにバリエーションを増やしていった。</p>
        <div class="timeline-image-group">
          <img class="timeline-image" src="images/icon-origin-summer.png" alt="夏バージョンのアイコン">
          <img class="timeline-image" src="images/icon-origin-fall.png" alt="秋バージョンのアイコン">
          <img class="timeline-image" src="images/icon-origin-winter.png" alt="冬バージョンのアイコン">
        </div>
      </div>
    </li>

    <li class="timeline-item">
      <div class="timeline-body">
        <p>元々あったTwitterアカウントのアイコンも寄せていくことに。ペイントソフトで描いた。</p>
        <img class="timeline-image" src="images/icon-paint.jpg" alt="ペイントソフトで描いたアイコン">
      </div>
    </li>
  </ol>
</main>
</body>
</html>
