<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アイコンの変遷 | Nami Kimura</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="page">
  <a class="back-link" href="index.html">← トップに戻る</a>
  <h1>アイコンの変遷</h1>

  <ol class="timeline">
    <li class="timeline-item">
      <div class="timeline-body">
        <p>社内チャットで、ドラクエのスライムのアイコンを使っていた。</p>
      </div>
    </li>

    <li class="timeline-item">
      <div class="timeline-body">
        <p>社内で「著作権的に問題のある画像は使わないように」とのお達しが出る。</p>
      </div>
    </li>

    <li class="timeline-item">
      <div class="timeline-body">
        <p>ドラクエのスライムに似せて、パワポでアイコンを描いた。</p>
        <img class="timeline-image" src="images/icon-origin.png" alt="パワポで描いたスライム風アイコン">
      </div>
    </li>

    <li class="timeline-item">
      <div class="timeline-body">
        <p>季節ごとに何種類かバリエーションを作っていった。</p>
        <div class="timeline-image-group">
          <img class="timeline-image" src="images/icon-origin.png" alt="バリエーション1（準備中）">
          <img class="timeline-image" src="images/icon-origin.png" alt="バリエーション2（準備中）">
          <img class="timeline-image" src="images/icon-origin.png" alt="バリエーション3（準備中）">
        </div>
      </div>
    </li>

    <li class="timeline-item">
      <div class="timeline-body">
        <p>元々あったTwitterアカウントのアイコンを刷新する際に、ペイントソフトで描いた。</p>
        <img class="timeline-image" src="images/icon-paint.jpg" alt="ペイントソフトで描いたアイコン">
      </div>
    </li>
  </ol>
</main>
</body>
</html>
