<script>
  const pupils = document.querySelectorAll(".eye-pupil");
  const eyes = document.querySelectorAll(".eye");
  const maxOffset = 12;

  document.addEventListener("pointermove", (event) => {
    eyes.forEach((eye, i) => {
      const rect = eye.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const angle = Math.atan2(event.clientY - centerY, event.clientX - centerX);
      const x = Math.cos(angle) * maxOffset;
      const y = Math.sin(angle) * maxOffset;
      pupils[i].style.transform = `translate(${x}px, ${y}px)`;
    });
  });

  document.querySelector(".eyes").addEventListener("click", () => {
    pupils.forEach((pupil) => {
      const angle = Math.random() * Math.PI * 2;
      const radius = maxOffset * (0.9 + Math.random() * 0.1);
      const x = Math.cos(angle) * radius;
      const y = Math.sin(angle) * radius;
      pupil.style.transform = `translate(${x}px, ${y}px)`;
    });
  });
</script>
